    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
        if (window.Chart) {
            Chart.defaults.font.family = "'Exo 2', sans-serif";
            Chart.defaults.color = "#8BAFD4";

            Chart.defaults.plugins = Chart.defaults.plugins || {};
            Chart.defaults.plugins.legend = Chart.defaults.plugins.legend || { labels: {} };
            Chart.defaults.plugins.legend.labels.font = { size: 13, family: "'Exo 2', sans-serif" };

            Chart.defaults.scale.ticks.font = { size: 12, family: "'JetBrains Mono', monospace" };
            Chart.defaults.scale.title.font = { size: 13, family: "'JetBrains Mono', monospace" };
            Chart.defaults.scale.grid.color = "rgba(0, 245, 255, 0.08)";

            const mo = new MutationObserver(() => {
                const isL = document.documentElement.classList.contains('light');
                const tColor = isL ? '#2A4A6B' : '#8BAFD4';
                const gColor = isL ? 'rgba(0, 80, 255, 0.07)' : 'rgba(0, 245, 255, 0.08)';
                Chart.defaults.color = tColor;
                Chart.defaults.scale.grid.color = gColor;
                if (window.charts) {
                    Object.values(window.charts).forEach(c => {
                        if (c.options.scales) {
                            Object.values(c.options.scales).forEach(s => {
                                if (s.ticks) s.ticks.color = tColor;
                                if (s.grid) s.grid.color = gColor;
                            });
                        }
                        if (c.options.plugins?.legend?.labels) c.options.plugins.legend.labels.color = tColor;
                        c.update('none');
                    });
                }
            });
            mo.observe(document.documentElement, { attributes: true, attributeFilter: ['class', 'data-theme'] });
        }
    </script>
